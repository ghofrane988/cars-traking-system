<div class="login-wrapper">
  <div class="auth-card">
    <!-- Left: Form -->
    <div class="auth-form-side">
      <div class="auth-logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <span>FleetCommand</span>
      </div>

      <div class="auth-header">
        <h1>Start your<br>perfect trip</h1>
      </div>

      <div class="divider">
        <span>with</span>
      </div>

      <div class="form-container">
        <form (ngSubmit)="onSubmit()">
          <div class="input-group">
            <input type="email" [(ngModel)]="email" name="email" class="input-field" placeholder="Email" required>
          </div>

          <div class="input-group">
            <div class="password-wrapper">
              <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password"
                class="input-field" placeholder="Password" required>
              <span class="eye-icon" (click)="togglePassword()">
                <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                  </path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </span>
            </div>
          </div>

          <button type="submit" class="btn-submit" [disabled]="loading">
            {{ loading ? 'Signing in...' : 'Start' }}
          </button>
        </form>

        <div class="error-msg" *ngIf="error">{{ error }}</div>

        <div class="auth-footer">Are you forgot the password!! <a routerLink="/forgot-password">Forgot
            password?</a><br>
        </div>
      </div>
    </div>

    <!-- Right: Image with overlays -->
    <div class="auth-image-side">
      <div class="inner-image-container">

      </div>
    </div>
  </div>
</div>
