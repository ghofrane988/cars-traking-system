<div class="login-wrapper">
    <div class="auth-card">
        <div class="auth-form-side">
            <div class="auth-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                <span>FleetCommand</span>
            </div>

            <div class="auth-header">
                <h1>Welcome! 👋</h1>
                <p style="color: #888; font-size: 14px; margin-top: -10px; margin-bottom: 30px;">This is your first
                    login. Please set a secure password.</p>
            </div>

            <div class="form-container">
                <div class="input-group text-left" style="text-align: left;">
                    <input type="password" [(ngModel)]="newPassword" class="input-field"
                        placeholder="New Password (min 6)" required>
                </div>

                <div class="error-msg" *ngIf="error" style="margin-bottom: 20px;">{{ error }}</div>

                <div style="display: flex; gap: 10px; width: 100%;">
                    <button class="btn-submit" style="background: #eee; color: #666; flex: 1;"
                        (click)="skip()">Skip</button>
                    <button class="btn-submit" style="flex: 2;" (click)="savePassword()">Mettre à jour &
                        Continuer</button>
                </div>
            </div>
        </div>

        <div class="auth-image-side">
            <div class="inner-image-container">
                <div class="overlay-card card-1">
                    <div class="dot"></div>
                    <h4>First Step</h4>
                    <p>Secure your profile</p>
                </div>
            </div>
        </div>
    </div>
</div>
