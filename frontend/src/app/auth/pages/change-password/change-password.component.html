<div class="min-h-screen flex items-center justify-center p-4 bg-cover bg-center" style="background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('/assets/login-bg.jpg'); font-family: 'Inter', sans-serif;">
    <div class="flex bg-white rounded-[40px] overflow-hidden w-full max-w-6xl min-h-[600px] shadow-2xl">
        <!-- Form Side -->
        <div class="flex-1 p-8 sm:p-12 md:p-16 lg:p-20 flex flex-col items-center justify-center text-center">
            <div class="flex items-center gap-2 text-2xl font-extrabold text-[#047857] mb-6">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                <span>FleetCommand</span>
            </div>

            <div class="mb-8">
                <h1 class="text-3xl sm:text-4xl font-bold text-gray-900 mb-2 leading-tight">Change your<br>password</h1>
                <p class="text-sm text-gray-500">Update your account security with a new password.</p>
            </div>

            <div class="w-full max-w-[350px]">
                <div class="mb-5">
                    <input type="password" [(ngModel)]="newPassword" class="w-full px-6 py-4 bg-gray-100 border-none rounded-full text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-[#047857] transition-all"
                        placeholder="New Password (min 6)" required>
                </div>

                <div class="mb-5">
                    <input type="password" [(ngModel)]="confirmPassword" class="w-full px-6 py-4 bg-gray-100 border-none rounded-full text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-[#047857] transition-all"
                        placeholder="Confirm New Password" required>
                </div>

                <div class="text-red-600 text-sm mb-5 text-left font-medium" *ngIf="error">{{ error }}</div>

                <div class="flex gap-3 w-full">
                    <button class="flex-1 py-4 bg-gray-200 text-gray-600 rounded-full font-semibold hover:bg-gray-300 transition-colors"
                        (click)="cancel()">Cancel</button>
                    <button class="flex-[2] py-4 bg-[#047857] text-white rounded-full font-semibold hover:bg-[#204e39] transition-colors disabled:opacity-70 disabled:cursor-not-allowed"
                        (click)="savePassword()" [disabled]="loading">
                        {{ loading ? 'Updating...' : 'Update Password' }}
                    </button>
                </div>
            </div>
        </div>

        <!-- Image Side -->
        <div class="hidden lg:flex flex-[1.2] p-5 relative">
            <div class="w-full h-full rounded-[30px] bg-cover bg-center relative" style="background-image: url('/assets/login-bg.jpg');">
                <div class="absolute top-[30%] left-[15%] bg-white/20 backdrop-blur-md p-4 rounded-2xl text-white border border-white/30 shadow-lg">
                    <div class="w-2 h-2 bg-white rounded-full mb-2"></div>
                    <h4 class="font-bold text-lg">Security</h4>
                    <p class="text-sm opacity-90">Keep your account safe</p>
                </div>
            </div>
        </div>
    </div>
</div>
