<div class="login-wrapper">
    <div class="auth-card">
        <div class="auth-form-side">
            <div class="auth-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                <span>FleetCommand</span>
            </div>

            <div class="auth-header">
                <h1>Forgot your<br>password?</h1>
                <p style="color: #888; font-size: 14px; margin-top: -20px; margin-bottom: 30px;">Don't worry, it
                    happens. Enter your email below to reset it.</p>
            </div>

            <div class="form-container">
                <form (ngSubmit)="submit()">
                    <div class="input-group">
                        <input type="email" [(ngModel)]="email" name="email" class="input-field"
                            placeholder="Email address" required>
                    </div>

                    <button type="submit" class="btn-submit" [disabled]="loading || !email">
                        {{ loading ? 'Sending...' : 'Send reset link' }}
                    </button>
                </form>

                <div class="alert alert-success" *ngIf="message"
                    style="margin-top: 20px; color: #2d6a4f; font-weight: 600;">{{ message }}</div>
                <div class="error-msg" *ngIf="error">{{ error }}</div>

                <div class="auth-footer">
                    Remember your password? <a routerLink="/login">Log in</a>
                </div>
            </div>
        </div>

        <div class="auth-image-side">
            <div class="inner-image-container">
            </div>
        </div>
    </div>
</div>
