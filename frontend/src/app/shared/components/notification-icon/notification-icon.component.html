<div class="notification-container">
  <!-- 🔔 Bell Icon with Badge -->
  <button class="notification-btn" [class.active]="showDropdown" (click)="toggleDropdown()" title="Notifications">
    <span class="bell-icon">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
        </path>
      </svg>
    </span>
    <span class="badge" *ngIf="unreadCount > 0"></span>
  </button>

  <!-- 📋 Dropdown -->
  <div class="notification-dropdown" *ngIf="showDropdown">
    <div class="dropdown-header">
      <h4>Notifications</h4>
      <button class="mark-all-btn" *ngIf="unreadCount > 0" (click)="markAllAsRead($event)">
        Tout marquer comme lu
      </button>
    </div>

    <div class="notification-list">
      <!-- Empty State -->
      <div class="empty-state" *ngIf="notifications.length === 0">
        <p>📭 Aucune notification</p>
      </div>

      <!-- Notification Items -->
      <div class="notification-item" *ngFor="let n of notifications.slice(0, 10)" [class.unread]="!n.is_read"
        [class.clickable]="n.link" (click)="onNotificationClick($event, n)" [title]="n.link ? 'Cliquer pour voir' : ''">
        <div class="notification-content">
          <p class="message">{{ n.message }}</p>
          <span class="time">{{ n.created_at | date:'dd/MM HH:mm' }}</span>
          <span class="link-hint" *ngIf="n.link">↗ Voir</span>
        </div>
        <span class="unread-dot" *ngIf="!n.is_read"></span>
      </div>

      <!-- More indicator -->
      <div class="more-indicator" *ngIf="notifications.length > 10">
        + {{ notifications.length - 10 }} autres notifications...
      </div>
    </div>

    <!-- Close button -->
    <button class="close-dropdown" (click)="closeDropdown()">Fermer</button>
  </div>
</div>

<!-- Click outside to close -->
<div class="dropdown-backdrop" *ngIf="showDropdown" (click)="closeDropdown()"></div>
